# Workflow oficial para compilar o diretório site/ e publicar no GitHub Pages.
name: Deploy Jekyll site to Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/jekyll-gh-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Validate generated site
        shell: bash
        run: |
          set -euo pipefail
          test -s _site/index.html
          test -s _site/assets/css/main.css
          test -s _site/arquitetura/index.html
          test -s _site/requisitos/index.html
          test -s _site/casos-de-uso/index.html
          test -s _site/assets/images/logo-meu-dinheiro.webp
          test -s _site/assets/images/hero-regiao.webp
          test -s _site/assets/images/ecossistema-local.webp
          test -s _site/sitemap.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

  deploy:
    name: Deploy GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
